{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Iniciar Sesión — Gestor de Salas</title>

    <!-- Bootstrap 5.3 -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet"
    >

    <!-- CSS del sistema (variables de color, login-card) -->
    <link rel="stylesheet" href="{% static 'reservas/css/style.css' %}">

</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh; background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 55%, #2563eb 100%);">

    <div class="login-card">

        <div class="text-center mb-4">
            <div style="font-size:2.5rem; margin-bottom: 8px;">🏢</div>
            <div class="login-logo">Sistema Gestor</div>
            <p class="text-secondary">Iniciar Sesión</p>
        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">
                    <i class="bi bi-person-fill me-1"></i> Usuario
                </label>
                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Tu nombre de usuario"
                    required
                    autofocus
                >
            </div>

            <div class="mb-4">
                <label class="form-label">
                    <i class="bi bi-lock-fill me-1"></i> Contraseña
                </label>
                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Tu contraseña"
                    required
                >
            </div>

            <button class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right me-1"></i> Ingresar
            </button>

        </form>

        {% if form.errors %}
        <div class="alert alert-danger mt-4">
            <i class="bi bi-exclamation-triangle-fill me-1"></i>
            Usuario o contraseña incorrectos.
        </div>
        {% endif %}

        {% if error %}
        <div class="alert alert-danger mt-4">
            <i class="bi bi-exclamation-triangle-fill me-1"></i>
            {{ error }}
        </div>
        {% endif %}

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
